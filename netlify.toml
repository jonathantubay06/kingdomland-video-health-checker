[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

[functions]
  directory = "netlify/functions"

# Only deploy from main branch — pushes to 'data' branch won't trigger builds
[context.production]
  branch = "main"

# Redirect /api/trigger-check to Netlify Function
[[redirects]]
  from = "/api/trigger-check"
  to = "/.netlify/functions/trigger-check"
  status = 200

[[redirects]]
  from = "/api/check-status"
  to = "/.netlify/functions/check-status"
  status = 200

[[redirects]]
  from = "/api/get-report"
  to = "/.netlify/functions/get-report"
  status = 200

[[redirects]]
  from = "/api/get-progress"
  to = "/.netlify/functions/get-progress"
  status = 200

[[redirects]]
  from = "/api/cancel-run"
  to = "/.netlify/functions/cancel-run"
  status = 200

[[redirects]]
  from = "/api/health-badge"
  to = "/.netlify/functions/health-badge"
  status = 200

[[redirects]]
  from = "/api/webhook-notify"
  to = "/.netlify/functions/webhook-notify"
  status = 200

# Cross-check page uses /api/report (same data as /api/get-report)
[[redirects]]
  from = "/api/report"
  to = "/.netlify/functions/get-report"
  status = 200

[[redirects]]
  from = "/api/crosscheck"
  to = "/.netlify/functions/crosscheck"
  status = 200

[[redirects]]
  from = "/api/crosscheck/apply"
  to = "/.netlify/functions/crosscheck-apply"
  status = 200
