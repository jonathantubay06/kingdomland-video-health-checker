name: Video Health Check

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Check mode'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - story
          - music

  # Scheduled auto-checks: daily at 7 AM PHT (11 PM UTC previous day)
  schedule:
    - cron: '0 23 * * *'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Restore previous data from data branch
        run: |
          git fetch origin data 2>/dev/null || true
          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            # Pull existing history and previous report for diff comparison
            git show origin/data:history.json > history.json 2>/dev/null || echo "[]" > history.json
            git show origin/data:video-report.json > previous-report.json 2>/dev/null || true
          else
            echo "[]" > history.json
          fi

      - name: Run video check
        env:
          KL_USERNAME: ${{ secrets.KL_USERNAME }}
          KL_PASSWORD: ${{ secrets.KL_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode || 'both' }}"
          ARGS=""
          if [ "$MODE" = "story" ]; then ARGS="--story"; fi
          if [ "$MODE" = "music" ]; then ARGS="--music"; fi
          node check-videos.js $ARGS

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Send webhook notification
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK_URL" ] && [ -f video-report.json ]; then
            SUMMARY=$(node -e "const r=JSON.parse(require('fs').readFileSync('video-report.json','utf-8'));console.log(JSON.stringify(r.summary))")
            curl -s -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"event\":\"check_complete\",\"summary\":${SUMMARY},\"runId\":\"${{ github.run_id }}\",\"repo\":\"${{ github.repository }}\"}" \
              || echo "Webhook notification failed (non-critical)"
          fi

      - name: Push report to data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fix remote URL to use token (persists through branch switches)
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Save report files before switching branches
          mkdir -p /tmp/reports
          cp video-report.json /tmp/reports/ 2>/dev/null || true
          cp video-report.csv /tmp/reports/ 2>/dev/null || true
          cp failed-videos.txt /tmp/reports/ 2>/dev/null || true
          cp history.json /tmp/reports/ 2>/dev/null || true
          cp previous-report.json /tmp/reports/ 2>/dev/null || true

          # Create status metadata
          echo "{\"updatedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"runId\":\"${{ github.run_id }}\",\"mode\":\"${{ github.event.inputs.mode || 'both' }}\"}" > /tmp/reports/status.json

          # Switch to data branch (create if needed)
          git fetch origin data 2>/dev/null || true
          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            git checkout data
            git rm -rf . 2>/dev/null || true
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi

          # Copy only report files
          cp /tmp/reports/* .

          git add video-report.json video-report.csv failed-videos.txt status.json history.json previous-report.json 2>/dev/null || true
          git add -A
          git commit -m "Update video report $(date -u +%Y-%m-%d)" || echo "No changes"
          git push origin data
